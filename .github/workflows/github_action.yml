name: DNS Block&Redirect Configurer cron task

on:
  schedule:
    - cron: '30 1 * * *' # 04:30 MSK (01:30 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dns-configurer
          path: target/*.jar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - DNS_ND_MAIN
          - DNS_ND_TV
          - DNS_CF_MAIN
          # Uncomment or add more environments as needed:
          # - DNS_TV
          # - DNS_PS5

    environment: ${{ matrix.environment }}

    env:
      DNS: ${{ vars.DNS }}
      BLOCK: ${{ vars.BLOCK }}
      REDIRECT: ${{ vars.REDIRECT }}

      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      TZ: Europe/Moscow

    steps:
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dns-configurer

      - name: Run application [${{ matrix.environment }}]
        run: |
          echo "Deploying to environment: ${{ matrix.environment }}"
          java --enable-preview -jar *.jar
