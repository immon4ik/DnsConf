name: DNS Block&Redirect Configurer cron task

on:
  schedule:
    - cron: '30 1 * * *' # 04:30 MSK (01:30 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dns-configurer
          path: target/*.jar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - DNS_ND_MAIN
          - DNS_ND_TV
          - DNS_CF_MAIN
          # Uncomment or add more environments as needed:
          # - DNS_TV
          # - DNS_PS5

    environment: ${{ matrix.environment }}

    env:
      DNS: ${{ vars.DNS }}
      BLOCK: ${{ vars.BLOCK }}
      REDIRECT: ${{ vars.REDIRECT }}
      CUSTOM_HOSTS_ENABLED: ${{ vars.CUSTOM_HOSTS_ENABLED }}
      CMS_IP: ${{ vars.CMS_IP }}
      AMS_IP: ${{ vars.AMS_IP }}
      CUSTOM_HOSTS_OVERRIDES_PATH: ${{ vars.CUSTOM_HOSTS_OVERRIDES_PATH }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      TZ: Europe/Moscow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dns-configurer

      - name: Generate local hosts source
        if: ${{ env.CUSTOM_HOSTS_ENABLED == 'true' }}
        run: |
          MALW_LIMIT_ARG=""
          if [ -n "${{ vars.MALW_LINK_BLOCK_LIMIT }}" ]; then
            MALW_LIMIT_ARG="--malw-link-block-limit ${{ vars.MALW_LINK_BLOCK_LIMIT }}"
          fi

          python3 scripts/generate_hosts_source.py \
            ${MALW_LIMIT_ARG} \
            --output "artefacts/${{ matrix.environment }}.hosts"

      - name: Build custom hosts with cms/ams IPs
        if: ${{ env.CUSTOM_HOSTS_ENABLED == 'true' }}
        run: |
          if [ -z "${CMS_IP// }" ]; then
            echo "::error::CMS_IP is empty for environment ${{ matrix.environment }}"
            exit 1
          fi

          if [ -z "${AMS_IP// }" ]; then
            echo "::error::AMS_IP is empty for environment ${{ matrix.environment }}"
            exit 1
          fi

          OVERRIDES_ARG=""
          if [ -n "$CUSTOM_HOSTS_OVERRIDES_PATH" ]; then
            OVERRIDES_ARG="--overrides $CUSTOM_HOSTS_OVERRIDES_PATH"
          elif [ -f "config/custom-hosts-overrides.json" ]; then
            OVERRIDES_ARG="--overrides config/custom-hosts-overrides.json"
          fi

          python3 scripts/generate_custom_hosts.py \
            --input "artefacts/${{ matrix.environment }}.hosts" \
            --cms-ip "$CMS_IP" \
            --ams-ip "$AMS_IP" \
            ${OVERRIDES_ARG} \
            --output "artefacts/${{ matrix.environment }}.custom.hosts"

      - name: Override BLOCK and REDIRECT with custom hosts
        if: ${{ env.CUSTOM_HOSTS_ENABLED == 'true' }}
        run: |
          CUSTOM_HOSTS_URL="file://${GITHUB_WORKSPACE}/artefacts/${{ matrix.environment }}.custom.hosts"
          echo "BLOCK=${CUSTOM_HOSTS_URL}" >> "$GITHUB_ENV"
          echo "REDIRECT=${CUSTOM_HOSTS_URL}" >> "$GITHUB_ENV"

      - name: Upload custom hosts artifact
        if: ${{ env.CUSTOM_HOSTS_ENABLED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: custom-hosts-${{ matrix.environment }}
          path: |
            artefacts/${{ matrix.environment }}.hosts
            artefacts/${{ matrix.environment }}.custom.hosts
          retention-days: 7

      - name: Run application [${{ matrix.environment }}]
        run: |
          echo "Deploying to environment: ${{ matrix.environment }}"
          java --enable-preview -jar *.jar
