services:
  nginx-stream-router:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_NAME:-dns-stream-router}
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./streams-enabled:/etc/nginx/streams-enabled:ro
      - ./logs:/var/log/nginx
