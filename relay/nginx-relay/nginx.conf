worker_processes auto;

events {
    worker_connections 4096;
}

stream {
    log_format relay '$remote_addr [$time_local] $protocol $status '
                     '$bytes_sent $bytes_received $session_time '
                     '"$ssl_preread_server_name" "$upstream_addr"';

    access_log /var/log/nginx/access.log relay;
    error_log /var/log/nginx/error.log info;

    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;

    map $ssl_preread_server_name $relay_target {
        hostnames;
        default $ssl_preread_server_name:443;
        "" 127.0.0.1:9;
    }

    server {
        listen 443 reuseport;
        proxy_pass $relay_target;
        ssl_preread on;
        proxy_connect_timeout 10s;
        proxy_timeout 5m;
    }
}
